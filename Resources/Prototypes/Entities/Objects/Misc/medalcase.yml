- type: entity
  id: MedalCase
  name: medal case
  description: Case with medals.
  parent: [ BaseStorageItem, BaseBagOpenClose, BaseCommandContraband ]
  components:
  # Sunrise added start
  - type: EmitSoundOnPickup
    sound:
      path: /Audio/_Sunrise/Items/Handling/Cases/pickup.ogg
  - type: EmitSoundOnDrop
    sound:
      path: /Audio/_Sunrise/Items/Handling/Cases/drop.ogg
  - type: EmitSoundOnLand
    sound:
      path: /Audio/_Sunrise/Items/Handling/Cases/drop.ogg
  # Sunrise added end
  - type: Sprite
    sprite: Objects/Storage/medalcase.rsi
    layers:
    - state: closed
      map: ["closeLayer"]
    - state: open
      map: ["openLayer"]
  - type: Appearance
  - type: Item
    sprite: Objects/Storage/medalcase.rsi
    size: Normal
  - type: Storage
    # Sunrise added start
    storageOpenSound: /Audio/_Sunrise/Items/Cases/open.ogg
    storageCloseSound: /Audio/_Sunrise/Items/Cases/close.ogg
    # Sunrise added end
    grid:
    - 0,0,7,1
    whitelist:
      tags:
        - Medal
  - type: StorageFill
    contents:
    - id: ClothingNeckGoldmedal
    - id: ClothingNeckBronzeheart
    - id: ClothingNeckCargomedal
    - id: ClothingNeckEngineermedal
    - id: ClothingNeckMedicalmedal
    - id: ClothingNeckSciencemedal
    - id: ClothingNeckSecuritymedal
    - id: ClothingNeckClownmedal
